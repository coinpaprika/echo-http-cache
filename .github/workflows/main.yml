name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Quality & security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Lint Go Code
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  test:
    name: Test & coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Start Redis
        uses: supercharge/redis-github-action@1.8.0

      - name: Run unit tests
        run: make test
